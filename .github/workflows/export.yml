name: Export

on:
  push:
    tags:
      - v*

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v2

      - name: Pull tags
        run: git fetch --tags --force

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: install pakku
        run: brew install juraj-hrivnak/pakku/pakku

      - name: export pack
        run: pakku export

      - name: Release Packs
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            build/curseforge/tech-${{ github.ref_name }}.zip
